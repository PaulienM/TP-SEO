  <script>
  $(function() {
  			//On ajoute l ajax au clic sur les liens
  			$('nav a.ajax').click(function(e) {
  				$("#loading").show();
  				href = $(this).attr("href");

  				//On charge le contenu
  				loadContent(href);

  				// On ajoute la nouvelle url
  				history.pushState('', 'New URL: '+href, href);

  				//On bloc le href
  				e.preventDefault();
  			});

  			//Gestion de l'historique (backward / forward)
  			window.onpopstate = function(event) {
  				$("#loading").show();
  				console.log("pathname: "+location.pathname);
  				loadContent(location.pathname);
  			};

  		});
  </script>
